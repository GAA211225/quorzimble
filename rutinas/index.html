<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:#0d0e12;color:#e8e9ec;padding:16px;max-width:680px;margin:0 auto;padding-bottom:110px;}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.hdr h1{font-size:20px;font-weight:800;}
.hdr .fecha{font-size:12px;color:#8b93a3;}
.nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.nav-btn{padding:7px 13px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #2c2f38;background:#1a1c22;color:#8b93a3;transition:all .15s;white-space:nowrap;}
.nav-btn.active{background:#F43F5E;color:#fff;border-color:#F43F5E;}
.sec-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#8b93a3;margin:0 0 8px;}
.card{background:#1a1c22;border:1px solid #2c2f38;border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.card.done{border-color:#10B981;background:#122420;}
.ex-hdr{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:10px;}
.ex-name{font-size:15px;font-weight:700;color:#f3f4f6;}
.card.done .ex-name{color:#34D399;}
.ex-meta{font-size:12px;color:#8b93a3;white-space:nowrap;font-weight:600;}
.serie-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.set-dot{width:38px;height:38px;border-radius:50%;border:2px solid #34363f;background:#21232b;color:#7d8590;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;transition:all .12s;flex-shrink:0;}
.set-dot.on{background:#F43F5E;border-color:#F43F5E;color:#fff;}
.peso-input{width:78px;padding:7px 9px;border:1.5px solid #34363f;border-radius:8px;font-size:14px;font-weight:700;color:#f3f4f6;background:#21232b;}
.peso-input.reps{width:66px;}
.x-sep{color:#5b6270;font-size:13px;font-weight:600;}
.prb{font-size:11px;color:#FBBF24;background:rgba(251,191,36,.12);padding:2px 7px;border-radius:12px;font-weight:700;margin-left:6px;white-space:nowrap;}
.ex-nota{font-size:12px;color:#8b93a3;font-style:italic;margin-top:7px;padding-top:7px;border-top:1px solid #262933;}
.prog{background:#1a1c22;border:1px solid #2c2f38;border-radius:12px;padding:12px 16px;margin-bottom:12px;}
.prog-txt{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:7px;}
.prog-bar{height:8px;background:#21232b;border-radius:8px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,#F43F5E,#FB923C);border-radius:8px;transition:width .25s;width:0%;}
.btn-main{width:100%;padding:13px;border:none;border-radius:10px;background:#F43F5E;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;}
.btn-main:disabled{background:#23252c;color:#5b6270;cursor:default;}
.btn-sec{padding:8px 14px;border:1.5px solid #F43F5E;border-radius:8px;background:#1a1c22;color:#FB7185;font-size:13px;font-weight:600;cursor:pointer;}
.btn-mini{padding:6px 10px;border:1.5px solid #34363f;border-radius:8px;background:#21232b;color:#c7cbd4;font-size:13px;font-weight:700;cursor:pointer;}
.hl{border-left:3px solid #10B981;background:rgba(16,185,129,.10);border-radius:0 8px 8px 0;padding:10px 12px;font-size:13px;color:#34D399;margin-bottom:10px;}
.info{border-left:3px solid #3B82F6;background:rgba(59,130,246,.10);border-radius:0 8px 8px 0;padding:10px 12px;font-size:13px;color:#60A5FA;margin-bottom:10px;}
.pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;margin:2px;}
.p-rose{background:rgba(244,63,94,.15);color:#FB7185;}
.p-gray{background:#21232b;color:#8b93a3;border:1px solid #34363f;}
.edit-input{width:100%;padding:8px 10px;border:1.5px solid #34363f;border-radius:8px;font-size:14px;color:#f3f4f6;background:#21232b;margin-bottom:6px;}
.edit-grid{display:grid;grid-template-columns:1fr 46px 62px 56px;gap:6px;margin-bottom:6px;}
.edit-grid input{padding:8px 8px;border:1.5px solid #34363f;border-radius:8px;font-size:13px;background:#21232b;color:#f3f4f6;width:100%;}
.edit-actions{display:flex;gap:6px;justify-content:flex-end;}
.hist-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.hist-fecha{font-size:12px;color:#8b93a3;}
.hist-dia{font-size:14px;font-weight:700;}
.hist-row{display:flex;justify-content:space-between;flex-wrap:wrap;gap:2px 10px;padding:5px 0;border-bottom:1px solid #262933;font-size:13px;}
.hist-row:last-child{border-bottom:none;}
.sel{width:100%;padding:9px 10px;border:1.5px solid #34363f;border-radius:8px;background:#21232b;color:#f3f4f6;font-size:13px;font-weight:600;}
.seg{display:flex;gap:6px;margin:10px 0;}
.seg-btn{flex:1;padding:8px;border-radius:8px;border:1.5px solid #34363f;background:#21232b;color:#8b93a3;font-size:12px;font-weight:700;cursor:pointer;}
.seg-btn.active{background:#F43F5E;border-color:#F43F5E;color:#fff;}
.ob-card{cursor:pointer;transition:border-color .15s;}
.ob-card:active{border-color:#F43F5E;}
.ob-title{font-size:15px;font-weight:800;}
.ob-days{font-size:11px;color:#FB7185;font-weight:700;white-space:nowrap;}
.ob-info{font-size:12px;color:#8b93a3;margin-top:4px;}
.ob-prev{font-size:11px;color:#5b6270;margin-top:6px;}
.timer{position:fixed;bottom:18px;right:16px;z-index:50;display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
.timer-panel{display:none;background:#1a1c22;border:1.5px solid #2c2f38;border-radius:14px;padding:10px;box-shadow:0 6px 20px rgba(0,0,0,.5);gap:6px;flex-wrap:wrap;justify-content:flex-end;max-width:280px;}
.timer-panel.open{display:flex;}
.timer-opt{padding:9px 13px;border-radius:10px;border:1.5px solid #34363f;background:#21232b;font-size:13px;font-weight:700;color:#c7cbd4;cursor:pointer;}
.timer-btn{width:62px;height:62px;border-radius:50%;border:none;background:#F43F5E;color:#fff;font-size:13px;font-weight:800;cursor:pointer;box-shadow:0 6px 16px rgba(244,63,94,.4);}
.timer-btn.run{background:#3B82F6;box-shadow:0 6px 16px rgba(59,130,246,.4);}
.empty{text-align:center;color:#8b93a3;font-size:13px;padding:30px 10px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;}
.overlay-card{background:#16181d;border:1px solid #34363f;border-radius:16px;padding:18px 16px;max-width:480px;width:100%;max-height:82vh;overflow:auto;box-shadow:0 10px 40px rgba(0,0,0,.6);}
.rec-row{padding:9px 0;border-bottom:1px solid #262933;font-size:13px;}
.rec-row:last-child{border-bottom:none;}
.perfil-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.perfil-grid label{font-size:11px;color:#8b93a3;font-weight:700;display:flex;flex-direction:column;gap:5px;}
.perfil-grid input,.perfil-grid select{padding:9px 10px;border:1.5px solid #34363f;border-radius:8px;background:#21232b;color:#f3f4f6;font-size:14px;font-weight:700;width:100%;}
.lvl-bar{display:flex;gap:4px;margin-top:8px;}
.lvl-seg{flex:1;height:8px;border-radius:4px;}
.count-card{background:linear-gradient(135deg,rgba(251,146,60,.18),#16181d 65%);border:1px solid rgba(251,146,60,.4);border-radius:14px;padding:16px;margin-bottom:12px;text-align:center;}
.count-num{font-size:44px;font-weight:900;color:#FB923C;line-height:1;}
.count-lbl{font-size:12px;color:#8b93a3;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-top:4px;}
.count-sub{font-size:13px;color:#e8e9ec;margin-top:10px;font-weight:600;}
.metric{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #262933;font-size:13px;}
.metric:last-child{border-bottom:none;}
.metric b{color:#f3f4f6;font-weight:800;}
.tip{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid #262933;}
.tip:last-child{border-bottom:none;}
.tip-ico{font-size:20px;flex-shrink:0;line-height:1.2;}
.tip-h{font-size:14px;font-weight:800;color:#f3f4f6;}
.tip-b{font-size:12.5px;color:#a9b0bd;line-height:1.5;margin-top:2px;}
.frase-card{background:linear-gradient(135deg,rgba(244,63,94,.16),#1a1c22 60%);border:1px solid rgba(244,63,94,.35);border-left:4px solid #F43F5E;border-radius:12px;padding:14px 16px;margin-bottom:12px;}
.frase-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#FB7185;margin-bottom:7px;}
.frase-txt{font-size:14px;font-weight:600;color:#e8e9ec;font-style:italic;line-height:1.5;}
.frase-autor{font-size:12px;color:#FB7185;font-weight:700;margin-top:8px;}
.frase-autor span{color:#8b93a3;font-weight:500;}
.frase-btn{margin-top:10px;padding:7px 13px;border:1.5px solid rgba(244,63,94,.5);border-radius:20px;background:transparent;color:#FB7185;font-size:12px;font-weight:700;cursor:pointer;}
.sec-block{padding:0;overflow:hidden;border-left-width:4px;}
.sec-hd{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;gap:8px;}
.sec-t{font-size:14px;font-weight:800;color:#f3f4f6;}
.sec-s{font-size:11px;color:#8b93a3;margin-top:2px;}
.sec-meta{font-size:12px;color:#8b93a3;font-weight:700;white-space:nowrap;}
.sec-body{padding:0 14px 8px;}
.chk-row{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-top:1px solid #262933;cursor:pointer;}
.chk{width:24px;height:24px;border-radius:7px;border:2px solid #34363f;background:#21232b;color:#34D399;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.chk.on{background:rgba(52,211,153,.16);border-color:#34D399;}
.chk-txt{font-size:13px;padding-top:1px;}
.chk-n{font-weight:700;color:#e8e9ec;}
.chk-row.on .chk-n{color:#8b93a3;text-decoration:line-through;}
.chk-d{color:#60A5FA;font-weight:600;font-size:12px;}
.chk-nota{font-size:11px;color:#8b93a3;font-style:italic;margin-top:2px;}
</style>
</head>

<div class="hdr">
  <div><h1>🏋️ Mis Rutinas</h1><p class="fecha" id="fecha-hoy"></p></div>

</div>

<div id="install-bar" style="display:none;justify-content:space-between;align-items:center;gap:10px;background:rgba(244,63,94,.12);border:1.5px solid #F43F5E;border-radius:10px;padding:10px 14px;margin-bottom:12px;">
  <span style="font-size:13px;color:#FB7185;font-weight:600;">📲 Instala esta página como app en tu teléfono</span>
  <button onclick="doInstall()" style="padding:8px 16px;border:none;border-radius:8px;background:#F43F5E;color:#fff;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;">Instalar</button>
</div>

<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;background:rgba(59,130,246,.10);border:1.5px solid #3B82F6;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#60A5FA;">

</div>

<div class="nav" id="nav"></div>

<div class="timer">

    <button class="timer-opt" onclick="startTimer(120)">2:00</button>

function hoyStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
/* Clave normalizada de ejercicio: así "Press de banca", "press banca " y "Press de Banca"
   comparten historial y PR en vez de perderse por mayúsculas, acentos o espacios de más. */
function keyEx(n){return String(n||'').normalize('NFC').toLowerCase().replace(/[áàâä]/g,'a').replace(/[éèêë]/g,'e').replace(/[íìîï]/g,'i').replace(/[óòôö]/g,'o').replace(/[úùûü]/g,'u').replace(/ñ/g,'n').replace(/\s+/g,' ').trim();}

let ultPesos=JSON.parse(localStorage.getItem('rutinasUlt')||'{}');
let prs=JSON.parse(localStorage.getItem('rutinasPRs')||'{}');

/* Mediciones corporales: [{f:'YYYY-MM-DD', kg:peso, bf:%grasa}] ordenadas de vieja a nueva */
let pesos=JSON.parse(localStorage.getItem('rutinasPesos')||'[]');
let progMedida='kg';

/* Migración: historial viejo {peso,hechas} → {sets:[{p,r}]} + vol */
hist.forEach(function(s){
 let v=0;
 (s.ejercicios||[]).forEach(function(e){
  if(!e.sets){
   e.sets=[];
   const nn=e.hechas||0;
   for(let k=0;k<nn;k++)e.sets.push({p:e.peso||'',r:''});
   delete e.peso;delete e.hechas;
  }
  e.sets.forEach(function(st){const p=parseFloat(st.p),r=parseInt(st.r);if(p&&r)v+=p*r;});
 });
 if(s.vol===undefined)s.vol=Math.round(v);
});
/* Migración: últimos pesos viejos "60" → {sets:[{p,r}]} */
Object.keys(ultPesos).forEach(function(k){
 if(typeof ultPesos[k]!=='object'||!ultPesos[k].sets)ultPesos[k]={sets:[{p:String(ultPesos[k]),r:''}]};
});
/* Sembrar PRs desde el historial si aún no existen */
if(!Object.keys(prs).length&&hist.length){
 for(let i=hist.length-1;i>=0;i--){
  hist[i].ejercicios.forEach(function(e){
   const k=keyEx(e.n);
   e.sets.forEach(function(st){
    const p=parseFloat(st.p);
    if(p&&(!prs[k]||p>prs[k].p))prs[k]={p:p,r:st.r||null,fecha:hist[i].fecha,n:e.n};
   });
  });
 }
}
/* Migración: pasar PRs y últimos pesos a claves normalizadas (fusiona duplicados por typo) */
(function(){
 const np={};
 Object.keys(prs).forEach(function(k){
  const v=prs[k];
  if(!v||typeof v!=='object')return;
  if(!v.n)v.n=k;                       // conserva el nombre bonito para mostrarlo
  const nk=keyEx(k);
  if(!np[nk]||v.p>np[nk].p)np[nk]=v;   // si hubo duplicados, gana el PR más alto
 });
 prs=np;
 const nu={};
 Object.keys(ultPesos).forEach(function(k){nu[keyEx(k)]=ultPesos[k];});
 ultPesos=nu;
})();
/* Sembrar la primera medición corporal desde el perfil, para que la gráfica tenga punto de partida */
if(!pesos.length&&parseFloat(perfil.peso)>0){
 pesos.push({f:hoyStr(),kg:parseFloat(perfil.peso),bf:parseFloat(meta.actualBF)||null});
}
/* Sesión del día: migrar formato viejo sets:[bool]+pesos */
let ses=JSON.parse(localStorage.getItem('rutinasSes')||'null');
if(!ses||ses.fecha!==hoyStr())ses={fecha:hoyStr(),dias:{}};
else Object.keys(ses.dias).forEach(function(d){
 const sd=ses.dias[d];
 Object.keys(sd.sets||{}).forEach(function(i){
  sd.sets[i]=(sd.sets[i]||[]).map(function(x){
   if(x&&typeof x==='object')return x;
   return x?{ok:true,p:(sd.pesos&&sd.pesos[i])||'',r:''}:null;
  });
 });
 delete sd.pesos;
});

/* ===== Perfil y estándares de fuerza =====
   Umbrales de 1RM en múltiplos de peso corporal (hombre, 18-35 años),
   basados en tablas tipo Strength Level / Kilgore. Se ajustan por sexo,
   edad y modo natural/ciclo con factorPerfil(). */
const NIVELES=['Principiante','Novato','Intermedio','Avanzado','Élite'];
const NIVEL_ICO=['🌱','🌿','💪','🔥','👑'];
const NIVEL_COL=['#9CA3AF','#60A5FA','#34D399','#FB923C','#FBBF24'];
const STD=[
 {k:['peso muerto rumano','rumano'],v:[0.60,0.90,1.30,1.80,2.30]},
 {k:['peso muerto'],v:[1.00,1.25,1.75,2.25,2.75]},
 {k:['press de banca','press banca','bench'],v:[0.50,0.75,1.00,1.50,2.00]},
 {k:['sentadilla','squat'],v:[0.75,1.00,1.50,2.00,2.50]},
 {k:['press militar','militar'],v:[0.35,0.55,0.80,1.05,1.30]},
 {k:['remo con barra'],v:[0.50,0.75,1.00,1.30,1.60]},
 {k:['prensa'],v:[1.00,1.75,2.50,3.25,4.00]},
 {k:['jalón','dominadas'],v:[0.45,0.65,0.85,1.10,1.40]},
 {k:['curl de bíceps con barra'],v:[0.20,0.35,0.55,0.75,0.95]},
 {k:['hip thrust'],v:[0.75,1.25,1.75,2.50,3.25]}
];
function stdDe(n){
 const s=String(n).toLowerCase();
 if(s.indexOf('mancuerna')>=0)return null; // estándares son de barra/máquina
 for(let i=0;i<STD.length;i++)if(STD[i].k.some(function(k){return s.indexOf(k)>=0;}))return STD[i];
 return null;
}
function perfilOk(){return parseFloat(perfil.peso)>0;}
function factorPerfil(){
 let f=1;
 if(perfil.sexo==='m')f*=0.72;
 const a=parseInt(perfil.edad);
 if(a){if(a<18)f*=0.9;else if(a>35)f*=Math.max(0.6,1-(a-35)*0.008);}
 if(perfil.modo==='ciclo')f*=1.15;
 return f;
}
function est1RM(p,r){p=parseFloat(p);r=parseInt(r)||1;if(!p)return 0;return p*(1+Math.min(r,12)/30);}
function nivelDe(rm,std){
 const bw=parseFloat(perfil.peso);
 if(!bw||!rm)return null;
 const f=factorPerfil();
 const ths=std.v.map(function(x){return x*bw*f;});
 let idx=-1;
 ths.forEach(function(t,i){if(rm>=t)idx=i;});
 return {idx:idx,ths:ths,rm:rm,ratio:rm/bw,falta:idx<4?ths[idx+1]-rm:0};
}
function nivelTag(nv){
 if(!nv)return '';
 return nv.idx<0?'Empezando 🐣':NIVELES[nv.idx]+' '+NIVEL_ICO[nv.idx];
}
/* Recomendación de progresión (doble progresión sobre el rango de reps) */
function recoDe(ex,sets){
 const m=String(ex.r).match(/(\d+)(?:\s*[-–]\s*(\d+))?/);
 const conDatos=sets.filter(function(s){return parseFloat(s.p)>0&&parseInt(s.r)>0;});
 if(!m||!conDatos.length)return {ico:'📝',col:'#8b93a3',txt:'Registra peso y reps para recibir recomendación.'};
 const lo=parseInt(m[1]),hi=m[2]?parseInt(m[2]):parseInt(m[1]);
 const maxP=Math.max.apply(null,conDatos.map(function(s){return parseFloat(s.p);}));
 const topOk=conDatos.length>=ex.s&&conDatos.every(function(s){return parseInt(s.r)>=hi;});
 const bajo=conDatos.some(function(s){return parseInt(s.r)<lo;});
 const inc=/sentadilla|peso muerto|prensa/i.test(ex.n)?5:2.5;
 if(topOk)return {ico:'⬆️',col:'#34D399',txt:'Completaste todas las series al tope de reps. La próxima semana sube a <strong>'+fmt(maxP+inc)+' kg</strong>.'};
 if(!bajo)return {ico:'➡️',col:'#60A5FA',txt:'Vas dentro del rango. Mantén <strong>'+fmt(maxP)+' kg</strong> y busca '+hi+' reps en todas las series antes de subir.'};
 return {ico:'🔁',col:'#FB923C',txt:'Quedaste bajo el rango ('+lo+' reps). Mantén <strong>'+fmt(maxP)+' kg</strong> una semana más y consolida la técnica.'};
}

    +'</div>';
  }

 });

function toggleSet(i,s){
 const sd=sesDia(vista);
 if(!sd.sets[i])sd.sets[i]=[];
 const st=sd.sets[i][s]||{ok:false};
 if(st.ok)st.ok=false;
 else{
  st.ok=true;
  const pe=document.getElementById('inp-p-'+i+'-'+s),re=document.getElementById('inp-r-'+i+'-'+s);
  if(pe)st.p=pe.value;

function setVal(i,s,k,v){
 const sd=sesDia(vista);
 if(!sd.sets[i])sd.sets[i]=[];

 st[k]=v;
 sd.sets[i][s]=st;

}

function terminar(){
 const dia=rutina[vista],sd=sesDia(vista);
 const regs=[];let vol=0;
 dia.ejercicios.forEach(function(ex,i){
  const arr=sd.sets[i]||[];
  const sets=[];
  arr.forEach(function(x){if(x&&x.ok)sets.push({p:x.p||'',r:x.r||''});});
  if(!sets.length)return;
  regs.push({n:ex.n,sets:sets,total:ex.s,rec:recoDe(ex,sets)});
  ultPesos[keyEx(ex.n)]={sets:sets};
  sets.forEach(function(s2){const p=parseFloat(s2.p),r=parseInt(s2.r);if(p&&r)vol+=p*r;});
 });
 if(!regs.length)return;
 vol=Math.round(vol);
 /* PRs nuevos */
 const nuevos=[];
 regs.forEach(function(e){
  let maxP=0,maxR=null;
  e.sets.forEach(function(s2){const p=parseFloat(s2.p);if(p>maxP){maxP=p;maxR=s2.r||null;}});
  if(maxP>0){
   const k=keyEx(e.n),pr=prs[k];
   if(!pr||maxP>pr.p){prs[k]={p:maxP,r:maxR,fecha:hoyStr(),n:e.n};nuevos.push(e.n+': '+fmt(maxP)+' kg');}
  }
 });
 hist.unshift({fecha:hoyStr(),dia:dia.nombre,ejercicios:regs,vol:vol});
 if(hist.length>150)hist.length=150;
 delete ses.dias[vista];
 saveAll();
 try{
  const li=JSON.parse(localStorage.getItem('linkEntrenoHoy')||'null');
  if(li&&li.fecha===hoyStr()){li.entrenado=true;localStorage.setItem('linkEntrenoHoy',JSON.stringify(li));}
 }catch(e){}
 /* Resumen con recomendaciones de progresión */
 let rh='<p style="font-size:17px;font-weight:800;margin-bottom:10px;">💪 Entreno guardado — '+esc(dia.nombre)+'</p>';
 if(vol>0)rh+='<div style="font-size:13px;font-weight:700;color:#FB7185;margin-bottom:8px;">🏋️ Volumen total: '+fmt(vol)+' kg</div>';
 if(nuevos.length)rh+='<div class="hl">🏆 ¡NUEVO PR! '+esc(nuevos.join(' · '))+'</div>';
 rh+='<p class="sec-title" style="margin-top:12px;">¿Subo de peso la próxima semana?</p>';
 regs.forEach(function(e){
  let nivelTxt='';
  const std=stdDe(e.n);
  if(std&&perfilOk()){
   let best=0;
   e.sets.forEach(function(s2){const v=est1RM(s2.p,s2.r);if(v>best)best=v;});
   const nv=nivelDe(best,std);
   if(nv&&best>0)nivelTxt='<div style="font-size:11px;color:#8b93a3;margin-top:3px;">📊 Nivel: <strong>'+nivelTag(nv)+'</strong> — 1RM est. '+fmt(Math.round(nv.rm))+' kg ('+(Math.round(nv.ratio*100)/100)+'× corporal)</div>';
  }
  rh+='<div class="rec-row"><div style="font-weight:700;">'+esc(e.n)+'</div><div style="color:'+e.rec.col+';margin-top:3px;">'+e.rec.ico+' '+e.rec.txt+'</div>'+nivelTxt+'</div>';
 });
 if(!perfilOk())rh+='<div class="info" style="margin-top:12px;">👤 Llena tu <strong>Perfil</strong> (peso corporal, edad, natural/ciclo) y aquí te diré también si tus pesos son altos o bajos según estándares de fuerza.</div>';
 rh+='<p style="font-size:11px;color:#8b93a3;margin:10px 0 12px;">💡 Estás en déficit: mantener tus pesos semana a semana ya es progreso. Sube solo cuando el recuadro esté en verde.</p>';
 const bajas=analizarEstancamiento().filter(function(x){return x.tipo==='baja';});
 if(bajas.length>=2)rh+='<div style="border-left:3px solid #FB7185;background:rgba(244,63,94,.10);border-radius:0 8px 8px 0;padding:10px 12px;font-size:12.5px;color:#FB7185;margin-bottom:10px;line-height:1.5;">🚨 <strong>Tu fuerza va cayendo en '+bajas.length+' ejercicios.</strong> En déficit agresivo eso suele significar pérdida de músculo. Sube un poco las calorías (proteína primero) o baja el volumen una semana. Detalle en 📈 Progreso.</div>';
 const db=diasDesdeBackup();
 if(db===null||db>14)rh+='<div class="info" style="margin-bottom:10px;">💾 '+(db===null?'Aún no has respaldado tus datos.':'Llevas '+db+' días sin respaldo.')+' Ve a <strong>👤 Perfil → Descargar respaldo</strong> para no perder tu historial.</div>';
 mostrarResumen(rh);
 render();
}

/* ===== Progreso: gráficas + historial ===== */
function datosProg(n,met){
 const pts=[],kn=keyEx(n);
 for(let i=hist.length-1;i>=0;i--){
  const s=hist[i];
  let e=null;
  s.ejercicios.forEach(function(x){if(keyEx(x.n)===kn)e=x;});
  if(!e)continue;
  let v=0;
  e.sets.forEach(function(st){
   const p=parseFloat(st.p),r=parseInt(st.r);
   if(met==='vol'){if(p&&r)v+=p*r;}
   else{if(p&&p>v)v=p;}
  });
  if(v>0)pts.push({f:s.fecha,v:Math.round(v*10)/10});
 }
 return pts;
}
function chartSVG(pts,unidad,col,colFuerte){
 col=col||'#F43F5E';colFuerte=colFuerte||'#FB7185';
 const W=340,H=170,L=42,R=14,T=18,B=26;
 let mn=Infinity,mx=-Infinity;
 pts.forEach(function(p){if(p.v<mn)mn=p.v;if(p.v>mx)mx=p.v;});
 if(mx===mn){mx+=1;mn=Math.max(0,mn-1);}
 const pad=(mx-mn)*.15;mn=Math.max(0,mn-pad);mx+=pad;
 function X(i){return L+(W-L-R)*i/(pts.length-1);}
 function Y(v){return T+(H-T-B)*(1-(v-mn)/(mx-mn));}
 let h='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block;" xmlns="http://www.w3.org/2000/svg">';
 [mn,(mn+mx)/2,mx].forEach(function(v){
  const y=Y(v);
  h+='<line x1="'+L+'" y1="'+y+'" x2="'+(W-R)+'" y2="'+y+'" stroke="#2c2f38" stroke-width="1"/>';
  h+='<text x="'+(L-6)+'" y="'+(y+3)+'" text-anchor="end" font-size="9" fill="#8b93a3">'+fmt(Math.round(v))+'</text>';
 });
 let linea='';
 pts.forEach(function(p,i){linea+=X(i)+','+Y(p.v)+' ';});
 h+='<polygon points="'+L+','+Y(mn)+' '+linea+(W-R)+','+Y(mn)+'" fill="'+col+'" fill-opacity=".09"/>';
 h+='<polyline points="'+linea.trim()+'" fill="none" stroke="'+col+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
 pts.forEach(function(p,i){
  const last=i===pts.length-1;
  h+='<circle cx="'+X(i)+'" cy="'+Y(p.v)+'" r="'+(last?4.5:3)+'" fill="'+(last?colFuerte:col)+'"'+(last?' stroke="#fff" stroke-width="1.5"':'')+'/>';
 });
 const lx=X(pts.length-1),ly=Y(pts[pts.length-1].v);
 h+='<text x="'+Math.min(lx,W-R-2)+'" y="'+Math.max(ly-9,10)+'" text-anchor="end" font-size="11" font-weight="700" fill="'+colFuerte+'">'+fmt(pts[pts.length-1].v)+' '+unidad+'</text>';
 h+='<text x="'+L+'" y="'+(H-6)+'" font-size="9" fill="#8b93a3">'+fmtF(pts[0].f)+'</text>';
 h+='<text x="'+(W-R)+'" y="'+(H-6)+'" text-anchor="end" font-size="9" fill="#8b93a3">'+fmtF(pts[pts.length-1].f)+'</text>';
 h+='</svg>';
 return h;
}

 }

  });
  if(s.vol)h+='<div style="font-size:12px;color:#FB7185;font-weight:700;margin-top:8px;">🏋️ Volumen: '+fmt(s.vol)+' kg</div>';
  h+='<div style="text-align:right;margin-top:8px;"><button class="btn-mini" onclick="borrarHist('+idx+')">🗑️ Borrar</button></div></div>';

/* ===== Detección de estancamiento / señal de deload ===== */
function mejor1RMSesion(e){
 let best=0;
 e.sets.forEach(function(st){const v=est1RM(st.p,st.r);if(v>best)best=v;});
 return best;
}
function analizarEstancamiento(){
 const porEj={};
 hist.forEach(function(s){
  s.ejercicios.forEach(function(e){
   const k=keyEx(e.n),rm=mejor1RMSesion(e);
   if(!rm)return;
   if(!porEj[k])porEj[k]={n:e.n,pts:[]};
   if(porEj[k].pts.length<4)porEj[k].pts.push({f:s.fecha,rm:rm}); // hist viene de nuevo a viejo
  });
 });
 const alertas=[];
 Object.keys(porEj).forEach(function(k){
  const p=porEj[k].pts;
  if(p.length<3)return;                       // hacen falta 3 sesiones para opinar
  const actual=p[0].rm,previas=p.slice(1);
  const maxPrev=Math.max.apply(null,previas.map(function(x){return x.rm;}));
  const caida=(maxPrev-actual)/maxPrev;
  if(caida>=0.05)alertas.push({n:porEj[k].n,tipo:'baja',pct:Math.round(caida*100)});
  else if(Math.abs(caida)<0.02&&p.length>=3){
   const rango=Math.max.apply(null,p.map(function(x){return x.rm;}))-Math.min.apply(null,p.map(function(x){return x.rm;}));
   if(rango/maxPrev<0.02)alertas.push({n:porEj[k].n,tipo:'estanca',pct:0});
  }
 });
 return alertas;
}
function cardEstancamiento(){
 const a=analizarEstancamiento();
 if(!a.length)return '';
 const bajas=a.filter(function(x){return x.tipo==='baja';});
 let h='<div class="card" style="border-left:4px solid '+(bajas.length>=2?'#FB7185':'#FB923C')+';">'
  +'<p class="sec-title">'+(bajas.length>=2?'🚨 Señal de alerta':'📌 Ojo con estos')+'</p>';
 a.forEach(function(x){
  h+='<div class="metric"><span>'+esc(x.n)+'</span><b style="color:'+(x.tipo==='baja'?'#FB7185':'#FB923C')+';">'
   +(x.tipo==='baja'?'▼ bajó '+x.pct+'%':'→ estancado')+'</b></div>';
 });
 if(bajas.length>=2){
  h+='<p style="font-size:12.5px;color:#FB7185;font-weight:700;margin-top:10px;line-height:1.5;">Tu fuerza está cayendo en '+bajas.length+' ejercicios a la vez. En déficit agresivo eso normalmente significa que <strong>estás perdiendo músculo</strong>, no solo grasa.</p>'
   +'<p style="font-size:12px;color:#a9b0bd;margin-top:6px;line-height:1.5;">Qué hacer: sube un poco las calorías (sobre todo proteína), duerme más, o baja una semana el volumen. Frenar aquí no es rendirse — es lo que protege lo que ya construiste.</p>';
 }else{
  h+='<p style="font-size:12px;color:#a9b0bd;margin-top:10px;line-height:1.5;">Estancarte en déficit es normal y no es alarma. Mantén el peso y busca sumar reps. Si además empieza a <strong>bajar</strong> en varios ejercicios, ahí sí hay que aflojar el déficit.</p>';
 }
 return h+'</div>';
}

/* ===== 🔥 Quema de grasa ===== */
function diasRestantes(){
 const hoy=new Date();hoy.setHours(0,0,0,0);
 const dl=new Date(meta.deadline+'T00:00:00');
 return Math.max(0,Math.round((dl-hoy)/86400000));
}
function edMeta(k,v){meta[k]=(k==='deadline')?v:(parseFloat(v)||0);saveAll();render();}

/* Mediciones corporales */
function syncUltimaMedicion(){
 const u=pesos[pesos.length-1];
 if(!u)return;
 if(u.kg>0)perfil.peso=String(u.kg);
 if(u.bf>0)meta.actualBF=u.bf;
}
function guardarMedicion(){
 const f=document.getElementById('med-fecha').value||hoyStr();
 const kg=parseFloat(document.getElementById('med-kg').value);
 const bf=parseFloat(document.getElementById('med-bf').value);
 if(!(kg>0)&&!(bf>0)){alert('Pon al menos tu peso o tu % de grasa.');return;}
 let ex=null;
 pesos.forEach(function(x){if(x.f===f)ex=x;});
 if(ex){if(kg>0)ex.kg=kg;if(bf>0)ex.bf=bf;}
 else pesos.push({f:f,kg:kg>0?kg:null,bf:bf>0?bf:null});
 pesos.sort(function(a,b){return a.f<b.f?-1:(a.f>b.f?1:0);});
 syncUltimaMedicion();
 saveAll();render();
}
function borrarMedicion(i){
 if(!confirm('¿Borrar esta medición?'))return;
 pesos.splice(i,1);
 syncUltimaMedicion();
 saveAll();render();
}
/* Ritmo real medido entre la primera y la última medición con dato */
function ritmoDe(campo){
 const arr=pesos.filter(function(x){return x[campo]>0;});
 if(arr.length<2)return null;
 const a=arr[0],b=arr[arr.length-1];
 const dias=(new Date(b.f+'T00:00:00')-new Date(a.f+'T00:00:00'))/86400000;
 if(dias<=0)return null;
 const delta=b[campo]-a[campo];
 return {delta:delta,porSem:delta/dias*7,dias:dias,desde:a.f,hasta:b.f};
}
function renderQuema(){
 const dias=diasRestantes();
 const sem=Math.max(1,Math.round(dias/7));
 const ini=parseFloat(meta.inicioBF)||0,act=parseFloat(meta.actualBF)||ini,obj=parseFloat(meta.metaBF)||0;
 const bw=parseFloat(perfil.peso)||0;
 const puntosTot=ini-obj,puntosVan=ini-act,puntosFalt=act-obj;
 const pct=puntosTot>0?Math.max(0,Math.min(100,Math.round(puntosVan/puntosTot*100))):0;

 let h='<div class="count-card"><div class="count-num">'+dias+'</div><div class="count-lbl">días para tu meta</div>'
  +'<div class="count-sub">De <strong style="color:#FB7185;">'+fmt(ini)+'% </strong> a <strong style="color:#34D399;">'+fmt(obj)+'%</strong> de grasa · hoy vas en <strong>'+fmt(act)+'%</strong></div>'
  +'<div class="prog-bar" style="margin-top:10px;"><div class="prog-fill" style="width:'+pct+'%"></div></div>'
  +'<div style="font-size:11px;color:#8b93a3;margin-top:6px;">'+pct+'% del camino · fecha meta: '+esc(meta.deadline)+'</div></div>';

 // Datos editables
 h+='<div class="card"><p class="sec-title">🎯 Mi meta</p><div class="perfil-grid">'
  +'<label>% grasa inicial<input type="number" step="0.1" inputmode="decimal" value="'+esc(meta.inicioBF)+'" onchange="edMeta(\'inicioBF\',this.value)"></label>'
  +'<label>% grasa hoy<input type="number" step="0.1" inputmode="decimal" value="'+esc(meta.actualBF)+'" onchange="edMeta(\'actualBF\',this.value)"></label>'
  +'<label>% grasa meta<input type="number" step="0.1" inputmode="decimal" value="'+esc(meta.metaBF)+'" onchange="edMeta(\'metaBF\',this.value)"></label>'
  +'<label>Fecha meta<input type="date" value="'+esc(meta.deadline)+'" onchange="edMeta(\'deadline\',this.value)"></label>'
  +'</div>';
 if(!bw)h+='<p style="font-size:12px;color:#FB923C;margin-top:8px;">💡 Pon tu peso corporal en <strong>👤 Perfil</strong> para calcular kilos de grasa, déficit y ritmo exactos.</p>';
 h+='</div>';

 // Registrar medición corporal
 h+='<div class="card"><p class="sec-title">📏 Registrar medición</p><div class="perfil-grid">'
  +'<label>Fecha<input type="date" id="med-fecha" value="'+hoyStr()+'"></label>'
  +'<label>Peso (kg)<input type="number" step="0.1" inputmode="decimal" id="med-kg" placeholder="'+(bw?fmt(bw):'--')+'"></label>'
  +'<label>% grasa<input type="number" step="0.1" inputmode="decimal" id="med-bf" placeholder="'+(act?fmt(act):'--')+'"></label>'
  +'</div>'
  +'<button class="btn-main" style="margin-top:10px;" onclick="guardarMedicion()">Guardar medición</button>'
  +'<p style="font-size:11px;color:#5b6270;margin-top:8px;">Mídete en las mismas condiciones (en ayunas, después del baño). La última medición actualiza sola tu peso y tu % de grasa arriba.</p>'
  +'</div>';

 // Evolución: gráfica + ritmo real vs necesario
 if(pesos.length){
  const ptsKg=pesos.filter(function(x){return x.kg>0;}).map(function(x){return {f:x.f,v:x.kg};});
  const ptsBf=pesos.filter(function(x){return x.bf>0;}).map(function(x){return {f:x.f,v:x.bf};});
  const serie=progMedida==='kg'?ptsKg:ptsBf;
  h+='<div class="card"><p class="sec-title">📉 Mi evolución — '+pesos.length+' medicion'+(pesos.length===1?'':'es')+'</p>'
   +'<div class="seg"><button class="seg-btn'+(progMedida==='kg'?' active':'')+'" onclick="progMedida=\'kg\';render()">Peso</button>'
   +'<button class="seg-btn'+(progMedida==='bf'?' active':'')+'" onclick="progMedida=\'bf\';render()">% grasa</button></div>';
  if(serie.length>=2)h+=chartSVG(serie,progMedida==='kg'?'kg':'%','#60A5FA','#93C5FD');
  else h+='<p class="empty" style="padding:14px 8px;">Registra al menos 2 mediciones para ver tu curva.</p>';

  const rb=ritmoDe('bf'),rk=ritmoDe('kg');
  if(rk)h+='<div class="metric"><span>Peso corporal</span><b>'+(rk.delta>0?'+':'')+fmt(Math.round(rk.delta*10)/10)+' kg en '+Math.round(rk.dias)+' días</b></div>';
  if(rb){
   const reqSem=sem>0?puntosFalt/sem:0;
   h+='<div class="metric"><span>Ritmo real</span><b>'+(rb.porSem>0?'+':'')+fmt(Math.round(rb.porSem*100)/100)+' pts grasa/sem</b></div>'
    +'<div class="metric"><span>Ritmo necesario</span><b>'+fmt(Math.round(reqSem*100)/100)+' pts/sem</b></div>';
   if(rb.porSem<0&&puntosFalt>0){
    const semNec=puntosFalt/Math.abs(rb.porSem);
    const proy=new Date();proy.setDate(proy.getDate()+Math.round(semNec*7));
    const fp=proy.getFullYear()+'-'+String(proy.getMonth()+1).padStart(2,'0')+'-'+String(proy.getDate()).padStart(2,'0');
    const aTiempo=fp<=meta.deadline;
    h+='<p style="font-size:12.5px;font-weight:700;margin-top:10px;line-height:1.5;color:'+(aTiempo?'#34D399':'#FB923C')+';">'
     +(aTiempo?'✅ Vas en ritmo. A este paso tocas '+fmt(obj)+'% alrededor del '+fp+', antes de tu fecha meta.'
              :'⚠️ Vas más lento de lo necesario. A este ritmo llegarías a '+fmt(obj)+'% hasta el '+fp+', después de tu meta ('+esc(meta.deadline)+').')+'</p>';
    if(!aTiempo)h+='<p style="font-size:12px;color:#a9b0bd;margin-top:6px;line-height:1.5;">No es fracaso: es información. Puedes apretar un poco el déficit y los pasos, o mover la fecha meta. Antes de apretar, revisa en 📈 Progreso que tu fuerza no esté cayendo.</p>';
   }else if(rb.porSem>=0){
    h+='<p style="font-size:12.5px;color:#FB923C;font-weight:700;margin-top:10px;line-height:1.5;">Tu % de grasa no ha bajado entre mediciones. Si ya pasaron 2+ semanas así, revisa el déficit real (porciones, bebidas, fines de semana) antes de meter más cardio.</p>';
   }
  }else if(pesos.length===1){
   h+='<p style="font-size:12px;color:#8b93a3;margin-top:10px;">Con una segunda medición podré decirte tu ritmo real y si llegas a tiempo. 📅</p>';
  }

  // Listado de mediciones (más recientes primero)
  h+='<div style="margin-top:12px;">';
  pesos.slice().reverse().slice(0,8).forEach(function(m){
   const idx=pesos.indexOf(m);
   h+='<div class="hist-row"><span>'+esc(m.f)+'</span><span style="font-weight:600;color:#c7cbd4;">'
    +(m.kg?fmt(m.kg)+' kg':'—')+(m.bf?' · '+fmt(m.bf)+'%':'')
    +' <button class="btn-mini" style="padding:2px 7px;margin-left:6px;color:#FB7185;" onclick="borrarMedicion('+idx+')">🗑️</button></span></div>';
  });
  h+='</div></div>';
 }

 // Proyección con matemática real
 if(bw&&puntosFalt>0){
  const lean=bw*(1-act/100);
  const pesoMeta=lean/(1-obj/100);
  const grasaBajar=bw-pesoMeta;
  const kgSem=grasaBajar/sem;
  const pctSem=kgSem/bw*100;
  const defDia=Math.round(kgSem*7700/7);
  let veredicto,vcol;
  if(pctSem>1.2){veredicto='⚠️ Ritmo MUY agresivo — riesgo real de perder músculo. Prioriza proteína alta y fuerza, y considera dar más semanas.';vcol='#FB7185';}
  else if(pctSem>1){veredicto='🔥 Ritmo agresivo pero posible si eres estricto. Cuida músculo con proteína y pesado.';vcol='#FB923C';}
  else{veredicto='✅ Ritmo sostenible. Con constancia esto se logra.';vcol='#34D399';}
  h+='<div class="card"><p class="sec-title">📉 Lo que exige tu meta</p>'
   +'<div class="metric"><span>Grasa por bajar</span><b>~'+fmt(Math.round(grasaBajar*10)/10)+' kg</b></div>'
   +'<div class="metric"><span>Ritmo necesario</span><b>~'+fmt(Math.round(kgSem*100)/100)+' kg/sem ('+fmt(Math.round(pctSem*100)/100)+'%)</b></div>'
   +'<div class="metric"><span>Déficit diario aprox.</span><b>~'+fmt(defDia)+' kcal</b></div>'
   +'<div class="metric"><span>Peso corporal meta</span><b>~'+fmt(Math.round(pesoMeta*10)/10)+' kg</b></div>'
   +'<p style="font-size:12.5px;color:'+vcol+';font-weight:700;margin-top:10px;line-height:1.5;">'+veredicto+'</p>'
   +'<p style="font-size:11px;color:#5b6270;margin-top:6px;">1 kg de grasa ≈ 7,700 kcal. El % de grasa por báscula/pinza es aproximado; mídelo igual cada 2 semanas y en las mismas condiciones.</p>'
   +'</div>';

  // Meta de pasos según déficit objetivo
  const kcalPaso=bw*0.00052; // ~0.04 kcal/paso a 77kg
  const pasosObj=Math.max(8000,Math.min(15000,Math.round((defDia*0.45)/kcalPaso/500)*500));
  h+='<div class="card"><p class="sec-title">👟 Tu meta de pasos</p>'
   +'<div style="text-align:center;padding:6px 0;"><span style="font-size:34px;font-weight:900;color:#60A5FA;">'+fmt(pasosObj)+'</span><span style="font-size:14px;color:#8b93a3;font-weight:700;"> pasos/día</span></div>'
   +'<p style="font-size:12.5px;color:#a9b0bd;line-height:1.5;">Ese volumen de NEAT (movimiento diario) aporta ~'+fmt(Math.round(pasosObj*kcalPaso))+' kcal y cubre buena parte de tu déficit sin tocar comida. Los pasos son el arma secreta: queman sin fatigar como el cardio duro.</p>'
   +'</div>';
 }

 // Consejos de oxidación de grasa
 h+='<p class="sec-title" style="margin-top:6px;">⚡ Protocolo de quema</p><div class="card">';
 const tips=[
  {i:'🚶',h:'Cardio en ayunas (LISS)',b:'20-40 min de caminata rápida o bici suave al despertar, antes del desayuno. Ojo con la verdad: <strong>en 24h no quema más grasa que en otro horario</strong> — lo que suma es el déficit total. Sirve porque es fácil de sostener y no te fatiga para el gym. Toma agua y sal; si haces pesas después, no lo hagas en ayuno.'},
  {i:'⏳',h:'Ayuno intermitente 16:8',b:'Comer en una ventana de 8h (ej. 12pm-8pm) no es magia: ayuda porque te hace comer menos sin contar tanto. Si te da hambre voraz y terminas comiendo de más, no es para ti. La proteína alta sigue mandando.'},
  {i:'🏃',h:'Cardio inteligente',b:'150-300 min/semana de zona 2 (puedes hablar entrecortado) + opcional 1-2 sesiones de HIIT de 10-15 min. Más no es mejor: demasiado cardio en déficit se come tu músculo y tu recuperación.'},
  {i:'🥩',h:'Proteína = tu escudo',b:'En un déficit agresivo la proteína decide si bajas grasa o músculo. Apunta a ~2g por kg de peso. Es lo que hace que la báscula baje de donde debe. Revisa tu <a href="../dieta.html" style="color:#60A5FA;font-weight:700;">plan de dieta</a>.'},
  {i:'🏋️',h:'Sigue levantando pesado',b:'El error #1 al querer definir: bajar los pesos y hacer "más reps para marcar". Falso. El peso pesado le dice a tu cuerpo que conserve el músculo. Mantén tu fuerza — tu app ya te avisa cuándo mantener.'},
  {i:'😴',h:'Dormir 7-9h',b:'Poco sueño dispara cortisol y hambre, y frena la pérdida de grasa. Dormir mal puede sabotear el mejor déficit. No es opcional en 119 días.'},
  {i:'💧',h:'Agua y sal',b:'3-4 L de agua al día controlan el hambre y el rendimiento. En déficit y con cardio en ayunas, una pizca de sal evita mareos.'}
 ];
 tips.forEach(function(t){h+='<div class="tip"><span class="tip-ico">'+t.i+'</span><div><div class="tip-h">'+t.h+'</div><div class="tip-b">'+t.b+'</div></div></div>';});
 h+='</div>';

 h+='<div class="info" style="margin-top:2px;">🧠 <strong>La verdad sin filtro:</strong> 18 puntos de grasa en 119 días es de lo más agresivo que hay. Da todo — pero mide tu progreso cada 2 semanas: si tu <strong>fuerza cae fuerte o el peso se estanca por semanas</strong>, es señal de frenar, no de apretar más. Llegar al 18-20% conservando tu músculo es mejor victoria que tocar 15% quedando plano. Se acabaron los juegos, pero jugamos inteligente. 💪</div>';
 return h;
}

/* Sugerencias de ejercicios: escribir el mismo nombre siempre evita perder historial y PRs */
const EJERCICIOS_SUGERIDOS=['Press de banca','Press inclinado con mancuernas','Press militar','Press militar con mancuernas','Aperturas con mancuernas','Fondos','Extensión de tríceps en polea','Extensión de tríceps sobre cabeza','Elevaciones laterales','Elevaciones frontales','Pájaros (deltoide posterior)','Jalón al pecho','Dominadas','Remo con barra','Remo con mancuerna','Remo en polea baja','Face pull','Encogimientos de hombros','Curl de bíceps con barra','Curl martillo','Curl concentrado','Sentadilla','Sentadilla frontal','Prensa','Peso muerto','Peso muerto rumano','Zancadas','Sentadilla búlgara','Extensión de cuádriceps','Curl femoral','Hip thrust','Pantorrilla de pie','Pantorrilla sentado','Plancha','Crunch en polea','Elevación de piernas'];
function poblarDatalist(){
 const dl=document.getElementById('lista-ex');
 if(!dl)return;
 const set={},nombres=[];
 function add(n){const k=keyEx(n);if(n&&!set[k]){set[k]=1;nombres.push(n);}}
 EJERCICIOS_SUGERIDOS.forEach(add);
 [RUTINA_DEFAULT,TORSO_PIERNA,FULL_BODY].forEach(function(pl){pl.forEach(function(d){d.ejercicios.forEach(function(e){add(e.n);});});});
 rutina.forEach(function(d){d.ejercicios.forEach(function(e){add(e.n);});});
 hist.forEach(function(s){s.ejercicios.forEach(function(e){add(e.n);});});
 nombres.sort(function(a,b){return a.localeCompare(b,'es');});
 dl.innerHTML=nombres.map(function(n){return '<option value="'+esc(n)+'">';}).join('');
}
function renderEdit(){
 const dia=rutina[vista];
 poblarDatalist();
 let h='<div class="info">Modo edición: cambia nombres, series, reps y descanso. Los cambios se guardan solos.<br><span style="font-size:11.5px;">💡 Al escribir el ejercicio te salen sugerencias — úsalas. Si escribes un nombre distinto al de antes, ese ejercicio empieza su historial y su PR desde cero.</span></div>';
 h+='<p class="sec-title">Nombre del día</p><input class="edit-input" value="'+esc(dia.nombre)+'" onchange="edDia(this.value)">';
 h+='<p class="sec-title" style="margin-top:10px;">Ejercicios — nombre · series · reps · descanso (seg)</p>';
 dia.ejercicios.forEach(function(ex,i){
  h+='<div class="card" style="padding:10px 12px;">'
   +'<div class="edit-grid">'
   +'<input list="lista-ex" value="'+esc(ex.n)+'" placeholder="Ejercicio" onchange="edEx('+i+',\'n\',this.value)">'
   +'<input type="number" min="1" max="10" value="'+ex.s+'" onchange="edEx('+i+',\'s\',this.value)">'
   +'<input value="'+esc(ex.r)+'" placeholder="reps" onchange="edEx('+i+',\'r\',this.value)">'
   +'<input type="number" min="15" max="600" step="5" value="'+(ex.desc||90)+'" onchange="edEx('+i+',\'desc\',this.value)">'
   +'</div>'
   +'<input class="edit-input" style="margin-bottom:8px;" value="'+esc(ex.nota||'')+'" placeholder="Nota (opcional)" onchange="edEx('+i+',\'nota\',this.value)">'
   +'<div class="edit-actions">'
   +'<button class="btn-mini" onclick="moverEx('+i+',-1)">↑</button>'
   +'<button class="btn-mini" onclick="moverEx('+i+',1)">↓</button>'
   +'<button class="btn-mini" style="color:#FB7185;" onclick="delEx('+i+')">🗑️</button>'
   +'</div></div>';
 });
 h+='<button class="btn-sec" style="width:100%;margin-bottom:8px;" onclick="addEx()">＋ Agregar ejercicio</button>';
 h+='<div style="display:flex;gap:8px;">'
  +'<button class="btn-mini" style="flex:1;" onclick="addDia()">＋ Agregar día</button>'
  +'<button class="btn-mini" style="flex:1;color:#FB7185;" onclick="delDia()">🗑️ Eliminar este día</button>'
  +'</div>';
 return h;
}
function limpiarSes(){delete ses.dias[vista];}
function edDia(v){rutina[vista].nombre=v||'Día';saveAll();renderNav();}
function edEx(i,k,v){
 const ex=rutina[vista].ejercicios[i];
 if(k==='s'){ex.s=Math.max(1,Math.min(10,parseInt(v)||1));limpiarSes();}
 else if(k==='desc')ex.desc=Math.max(15,Math.min(600,parseInt(v)||90));
 else ex[k]=v;
 saveAll();
}
function moverEx(i,dir){
 const arr=rutina[vista].ejercicios,j=i+dir;
 if(j<0||j>=arr.length)return;
 const t=arr[i];arr[i]=arr[j];arr[j]=t;
 limpiarSes();saveAll();render();
}
function delEx(i){
 if(!confirm('¿Quitar este ejercicio?'))return;
 rutina[vista].ejercicios.splice(i,1);
 limpiarSes();saveAll();render();
}
function addEx(){
 rutina[vista].ejercicios.push({n:'Nuevo ejercicio',s:3,r:'10',desc:90,nota:''});
 limpiarSes();saveAll();render();
}
function addDia(){
 rutina.push({nombre:'Nuevo día 💪',ejercicios:[{n:'Nuevo ejercicio',s:3,r:'10',desc:90,nota:''}]});
 vista=rutina.length-1;saveAll();render();
}
function delDia(){
 if(rutina.length<=1){alert('Debe quedar al menos un día.');return;}
 if(!confirm('¿Eliminar el día completo "'+rutina[vista].nombre+'"?'))return;
 rutina.splice(vista,1);
 ses.dias={};
 vista=0;editMode=false;
 document.getElementById('btn-edit').textContent='✏️ Editar';
 saveAll();render();
}

/* ===== Cronómetro de descanso ===== */
let timerInt=null,timerFin=0;
function toggleTimerPanel(){document.getElementById('timer-panel').classList.toggle('open');}
function toggleAuto(){
 autoTimer=!autoTimer;
 localStorage.setItem('rutinasAutoT',autoTimer?'1':'0');
 pintarAuto();
}
function pintarAuto(){
 const b=document.getElementById('timer-auto');
 b.textContent=autoTimer?'Auto ✓':'Auto ✗';
 b.style.color=autoTimer?'#34D399':'#8b93a3';
 b.style.borderColor=autoTimer?'rgba(52,211,153,.5)':'#34363f';
}
function startTimer(seg){
 stopTimer(true);
 timerFin=Date.now()+seg*1000;
 document.getElementById('timer-panel').classList.remove('open');
 const b=document.getElementById('timer-btn');
 b.classList.add('run');
 timerInt=setInterval(function(){
  const rest=Math.round((timerFin-Date.now())/1000);
  if(rest<=0){
   stopTimer(true);
   b.innerHTML='✅<br>¡Ya!';
   if(navigator.vibrate)navigator.vibrate([300,120,300,120,500]);
   setTimeout(function(){b.innerHTML='⏱️<br>Desc.';},4000);
   return;
  }
  b.innerHTML=Math.floor(rest/60)+':'+String(rest%60).padStart(2,'0');
 },250);
}
function stopTimer(silencio){
 if(timerInt){clearInterval(timerInt);timerInt=null;}
 const b=document.getElementById('timer-btn');
 b.classList.remove('run');
 if(!silencio){b.innerHTML='⏱️<br>Desc.';document.getElementById('timer-panel').classList.remove('open');}
}

let fraseIdx=(function(){const d=new Date();return Math.round(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())/86400000)%FRASES.length;})();
function pintarFrase(){
 const f=FRASES[fraseIdx];
 document.getElementById('frase-txt').textContent='“'+f.t+'”';
 document.getElementById('frase-autor').innerHTML='— '+esc(f.a)+' <span>· '+esc(f.d)+'</span>';
}
function otraFrase(){fraseIdx=(fraseIdx+1)%FRASES.length;pintarFrase();}

let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){

});

}
